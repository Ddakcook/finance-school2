<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🔗 DB 연결 상태 테스트 웹</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f8fafc; color: #334155; line-height: 1.6; }
    .box { background: white; border: 1px solid #cbd5e1; border-radius: 8px; padding: 20px; margin-bottom: 20px; max-width: 600px; }
    h2 { margin-top: 0; font-size: 18px; color: #0f172a; }
    .status { font-weight: bold; padding: 6px 12px; display: inline-block; border-radius: 4px; margin-bottom: 10px; }
    .loading { background: #f1f5f9; color: #64748b; }
    .success { background: #dcfce7; color: #15803d; }
    .fail { background: #fee2e2; color: #b91c1c; }
    input, button { padding: 10px; font-size: 14px; margin-right: 5px; border-radius: 4px; border: 1px solid #cbd5e1; }
    button { background: #2563eb; color: white; border: 0; cursor: pointer; font-weight: bold; }
    button:hover { background: #1d4ed8; }
    pre { background: #0f172a; color: #38bdf8; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 13px; max-height: 300px; }
  </style>
</head>
<body>

  <h1>📡 구글 시트 데이터베이스 연동 테스트</h1>
  <p>이 웹페이지는 구글 스크립트 API와 정상적으로 통신하는지 점검하는 전용 페이지입니다.</p>

  <div class="box">
    <h2>1. 현재 연결 상태</h2>
    <div id="connectionStatus" class="status loading">🔄 구글 서버에 신호 보내는 중...</div>
    <div><button type="button" onclick="checkConnection()">🔄 다시 연결 시험하기</button></div>
  </div>

  <div class="box">
    <h2>2. 테스트 데이터 전송 (시트에 행 추가)</h2>
    <input id="testName" type="text" placeholder="테스트 이름 입력" value="홍길동">
    <button type="button" onclick="sendTestData()">🚀 1건 전송하기</button>
    <p id="sendResult" style="margin-top:10px; font-weight:bold;"></p>
  </div>

  <div class="box" style="max-width: 100%;">
    <h2>3. 구글 시트에서 받아온 원본 데이터 (Raw JSON)</h2>
    <p>아래 창에 데이터가 구조적으로 출력된다면 통신망이 100% 뚫린 것입니다.</p>
    <pre id="rawLogs">데이터를 로드하는 중입니다...</pre>
  </div>

  <script>
    // 현재 사용 중이신 구글 웹앱 URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwZmr5C_v-no6eIVErRnR-235dZPU6HJvVeiPHh64o8LAbSpKSqZM_fkyuVbgcuuThk/exec';

    // [기능 1] 구글 시트 데이터 불러오기 및 연결 테스트
    function checkConnection() {
      const statusDiv = document.getElementById('connectionStatus');
      const logArea = document.getElementById('rawLogs');
      
      statusDiv.className = 'status loading';
      statusDiv.innerText = '🔄 구글 서버에 신호 보내는 중...';
      logArea.innerText = '데이터를 받아오는 중...';

      fetch(GAS_URL)
        .then(res => {
          if (!res.ok) throw new Error('HTTP 에러 발생: ' + res.status);
          return res.json();
        })
        .then(data => {
          // 성공 처리
          statusDiv.className = 'status success';
          statusDiv.innerText = '🟢 연결 성공! 구글 시트와 완벽히 연동됨';
          
          // 받아온 데이터 생으로 뿌리기
          logArea.innerText = JSON.stringify(data, null, 2);
        })
        .catch(err => {
          // 실패 처리
          statusDiv.className = 'status fail';
          statusDiv.innerText = '🔴 연결 실패! 통신 장애 또는 URL 주소 오류';
          logArea.innerText = '에러 내용:\n' + err.message + '\n\n*원인 추정:\n1. 구글 웹앱 주소가 틀렸거나\n2. 구글 스크립트 배포 시 [액세스 권한: Anyone] 설정을 누락했음.';
        });
    }

    // [기능 2] 데이터 가짜로 1건 쏘아보기
    function sendTestData() {
      const nameVal = document.getElementById('testName').value.trim();
      if (!nameVal) { alert('이름을 입력해 주세요.'); return; }

      const resultP = document.getElementById('sendResult');
      resultP.style.color = '#64748b';
      resultP.innerText = '📡 데이터 전송 요청 중...';

      // 가짜 페이로드 구성
      const fakePayload = {
        id: 'test_' + Date.now(),
        name: nameVal,
        totalMoney: 1000000,
        cash: 500000,
        memo: '연결 테스트용 데이터',
        stocks: [{ name: '테스트전자', price: 50000, rate: '+1.5%', round: '1차' }],
        waits: ['테스트바이오']
      };

      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'save', person: fakePayload })
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          resultP.style.color = '#15803d';
          resultP.innerText = '✅ 전송 성공! 구글 시트에 기록되었습니다.';
          checkConnection(); // 전송 성공 후 시트 갱신
        } else {
          resultP.style.color = '#b91c1c';
          resultP.innerText = '❌ 서버 거부: ' + res.error;
        }
      })
      .catch(err => {
        resultP.style.color = '#b91c1c';
        resultP.innerText = '❌ 네트워크 전송 실패: ' + err.message;
      });
    }

    // 페이지가 열리면 자동으로 첫 연결 시험 가동
    window.onload = checkConnection;
  </script>
</body>
</html>
