<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc, #ecfeff);
      color: #1f2937;
    }
    header { text-align: center; padding: 30px 16px 22px; }
    h1 { margin: 0; font-size: 30px; letter-spacing: -0.04em; }
    header p { margin: 10px 0 0; color: #6b7280; font-size: 14px; }

    .container {
      width: min(1320px, calc(100% - 40px));
      margin: 0 auto 44px;
      display: grid;
      grid-template-columns: 520px 1fr;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: rgba(255,255,255,0.96);
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(15,23,42,0.08);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 10px;
    }

    h2 { margin: 0; font-size: 20px; }

    label {
      display: block;
      margin: 14px 0 4px;
      font-size: 13px;
      font-weight: 800;
      color: #374151;
    }

    .money-guide {
      font-size: 11px;
      color: #2563eb;
      margin-bottom: 6px;
      height: 14px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 13px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      background: white;
      min-height: 42px;
    }

    input:focus, select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    button {
      border: 0;
      border-radius: 13px;
      padding: 11px 13px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-primary { width: 100%; background: #2563eb; color: white; margin-top: 18px; height: 48px; font-size: 15px; }
    .btn-sub { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .btn-dark { background: #111827; color: white; }
    .btn-danger { background: #fff1f2; color: #ef4444; }
    .btn-small { padding: 8px 11px; font-size: 12px; }

    .edit-mode {
      display: none;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      padding: 10px 12px;
      border-radius: 13px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 18px 0 10px;
    }

    .section-head h3 { margin: 0; font-size: 15px; }

    .stock-list, .wait-list { display: grid; gap: 8px; }

    .stock-item {
      display: grid;
      grid-template-columns: 1.2fr 1fr 58px .75fr 76px 42px;
      gap: 7px;
      align-items: center;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 15px;
      padding: 9px;
    }

    .wait-item {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 7px;
      align-items: center;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 15px;
      padding: 9px;
    }

    .delete-btn {
      height: 42px;
      padding: 0;
      background: #fff1f2;
      color: #ef4444;
    }

    .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

    .status {
      display: inline-flex;
      padding: 7px 11px;
      border-radius: 999px;
      background: #ecfdf5;
      color: #047857;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      background: white;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 820px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 12px 10px; text-align: left; vertical-align: top; }
    th { background: #f8fafc; color: #374151; font-size: 12px; }

    .badge {
      display: inline-flex;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin: 2px;
      line-height: 1.3;
    }

    .plus { background: #dcfce7; color: #166534; }
    .minus { background: #fee2e2; color: #991b1b; }
    .wait { background: #fef3c7; color: #92400e; }

    .empty { text-align: center; color: #6b7280; padding: 42px 20px; }
    .name-cell { font-weight: 900; white-space: nowrap; }
    .action-cell { display: flex; gap: 6px; flex-wrap: wrap; }

    .help { margin-top: 10px; color: #6b7280; font-size: 12px; line-height: 1.5; }

    @media (max-width: 1080px) { .container { grid-template-columns: 1fr; } }
    @media (max-width: 700px) {
      .container { width: calc(100% - 24px); }
      .row { grid-template-columns: 1fr; }
      .stock-item { grid-template-columns: 1fr 1fr; }
      .stock-item .delete-btn { grid-column: span 2; }
    }
  </style>
</head>

<body>
  <header>
    <h1>재정학교 투자현황 입력 시스템</h1>
    <p>고유 ID 기반으로 투명하게 연동되는 GitHub - Google Sheets 시스템입니다.</p>
  </header>

  <main class="container">
    <section class="card">
      <div class="title-row">
        <h2>내 투자현황 입력</h2>
        <button type="button" class="btn-sub" onclick="resetForm()">초기화</button>
      </div>

      <div id="editMode" class="edit-mode">수정 모드입니다. 저장하면 기존 데이터가 덮어쓰기 됩니다.</div>

      <label>이름</label>
      <input id="name" placeholder="예: 홍길동" onblur="loadPersonByName()">

      <div class="row">
        <div>
          <label>총 투자금</label>
          <input id="money" placeholder="예: 20000000" oninput="handleMoneyInput(this, 'moneyGuide')">
          <div id="moneyGuide" class="money-guide"></div>
        </div>
        <div>
          <label>예수금</label>
          <input id="cash" placeholder="예: 5000000" oninput="handleMoneyInput(this, 'cashGuide')">
          <div id="cashGuide" class="money-guide"></div>
        </div>
      </div>

      <label>변동 / 추가 메모</label>
      <input id="memo" placeholder="미입력 시 자동으로 '변동 0' 입력">

      <div class="section-head">
        <h3>매수 종목</h3>
        <button type="button" class="btn-sub btn-small" onclick="addStockItem()">+ 종목 추가</button>
      </div>
      <div id="stockList" class="stock-list"></div>

      <div class="section-head">
        <h3>대기 종목</h3>
        <button type="button" class="btn-sub btn-small" onclick="addWaitItem()">+ 대기 추가</button>
      </div>
      <div id="waitList" class="wait-list"></div>

      <button type="button" id="saveBtn" class="btn-primary" onclick="saveData()">저장하기</button>

      <p class="help">
        ※ 같은 이름으로 저장하거나 우측 표에서 수정을 누르면 기존 데이터가 업데이트됩니다.<br>
        ※ 실시간 통신 환경이므로 데이터 반영에 1~3초 가량 소요될 수 있습니다.
      </p>
    </section>

    <section class="card">
      <div class="title-row">
        <h2>전체 현황</h2>
        <span id="status" class="status">대기중</span>
      </div>

      <div class="toolbar">
        <button type="button" class="btn-dark" onclick="loadData()">새로고침</button>
        <button type="button" class="btn-danger" onclick="clearAll()">전체 삭제</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>총액</th>
              <th>예수금</th>
              <th>매수 종목</th>
              <th>대기</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="empty">데이터를 불러오는 중입니다.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    // 아까 전달해주신 실제 작동하는 구글 웹앱 URL 주소입니다.
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwZmr5C_v-no6eIVErRnR-235dZPU6HJvVeiPHh64o8LAbSpKSqZM_fkyuVbgcuuThk/exec';

    let people = [];
    let currentId = ''; 

    function onlyNumber(value) {
      return Number(String(value).replace(/[^0-9.-]/g, '')) || 0;
    }

    function money(value) {
      return Number(value || 0).toLocaleString('ko-KR') + '원';
    }

    function convertToKoreanCurrency(num) {
      if (!num || isNaN(num)) return '';
      if (num >= 100000000) {
        const eok = Math.floor(num / 100000000);
        const man = Math.floor((num % 100000000) / 10000);
        return man > 0 ? `${eok}억 ${man.toLocaleString('ko-KR')}만 원` : `${eok}억 원`;
      } else if (num >= 10000) {
        const man = Math.floor(num / 10000);
        return `${man.toLocaleString('ko-KR')}만 원`;
      }
      return num.toLocaleString('ko-KR') + '원';
    }

    function handleMoneyInput(input, guideId) {
      const raw = String(input.value).replace(/[^0-9]/g, '');
      input.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
      const numValue = Number(raw);
      document.getElementById(guideId).innerText = numValue ? `익는 중: ${convertToKoreanCurrency(numValue)}` : '';
    }

    function setStatus(text) {
      document.getElementById('status').innerText = text;
    }

    function normalizeRate(sign, value) {
      const clean = String(value || '').replace(/[+-%\s]/g, '');
      if (!clean) return '';
      return sign + clean + '%';
    }

    function splitRate(rate) {
      const text = String(rate || '').trim();
      return {
        sign: text.startsWith('-') ? '-' : '+',
        value: text.replace(/[+-%\s]/g, '')
      };
    }

    function addStockItem(data) {
      data = data || {};
      const rate = splitRate(data.rate || '');

      const box = document.createElement('div');
      box.className = 'stock-item';

      const name = document.createElement('input');
      name.className = 'stock-name';
      name.placeholder = '종목명';
      name.value = data.name || '';

      const price = document.createElement('input');
      price.className = 'stock-price';
      price.placeholder = '매수가';
      price.value = data.price ? Number(data.price).toLocaleString('ko-KR') : '';
      price.oninput = function() {
        const raw = String(price.value).replace(/[^0-9]/g, '');
        price.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
      };

      const sign = document.createElement('select');
      sign.className = 'stock-rate-sign';
      sign.innerHTML = '<option value="+">+</option><option value="-">-</option>';
      sign.value = rate.sign;

      const rateInput = document.createElement('input');
      rateInput.className = 'stock-rate';
      rateInput.placeholder = '수익률';
      rateInput.value = rate.value;

      const round = document.createElement('select');
      round.className = 'stock-round';
      round.innerHTML =
        '<option value="1차">1차</option>' +
        '<option value="2차">2차</option>' +
        '<option value="3차">3차</option>' +
        '<option value="4차">4차</option>';
      round.value = data.round || '1차';

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'delete-btn';
      del.innerText = '×';
      del.onclick = function() { box.remove(); };

      box.appendChild(name);
      box.appendChild(price);
      box.appendChild(sign);
      box.appendChild(rateInput);
      box.appendChild(round);
      box.appendChild(del);

      document.getElementById('stockList').appendChild(box);
    }

    function addWaitItem(value) {
      const box = document.createElement('div');
      box.className = 'wait-item';

      const input = document.createElement('input');
      input.className = 'wait-name';
      input.placeholder = '대기 종목명';
      input.value = value || '';

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'delete-btn';
      del.innerText = '×';
      del.onclick = function() { box.remove(); };

      box.appendChild(input);
      box.appendChild(del);

      document.getElementById('waitList').appendChild(box);
    }

    function resetForm() {
      currentId = ''; 
      document.getElementById('name').value = '';
      document.getElementById('money').value = '';
      document.getElementById('cash').value = '';
      document.getElementById('moneyGuide').innerText = '';
      document.getElementById('cashGuide').innerText = '';
      document.getElementById('memo').value = '';
      document.getElementById('stockList').innerHTML = '';
      document.getElementById('waitList').innerHTML = '';
      document.getElementById('editMode').style.display = 'none';

      addStockItem();
      addWaitItem();
    }

    function loadData() {
      setStatus('DB 불러오는 중');

      fetch(GAS_WEB_APP_URL)
        .then(res => res.json())
        .then(data => {
          people = data || [];
          renderTable();
          setStatus('DB 연결 정상');
        })
        .catch(error => {
          setStatus('불러오기 실패');
          alert('구글 시트 연동 실패: ' + error.message);
        });
    }

    function loadPersonByName() {
      if (currentId) return; 
      const name = document.getElementById('name').value.trim();
      if (!name) return;

      const person = people.find(p => p.name === name);
      if (person) fillForm(person);
    }

    function fillForm(p) {
      currentId = p.id || ''; 
      document.getElementById('name').value = p.name || '';
      document.getElementById('money').value = p.totalMoney ? Number(p.totalMoney).toLocaleString('ko-KR') : '';
      document.getElementById('cash').value = p.cash ? Number(p.cash).toLocaleString('ko-KR') : '';
      
      document.getElementById('moneyGuide').innerText = p.totalMoney ? `익는 중: ${convertToKoreanCurrency(p.totalMoney)}` : '';
      document.getElementById('cashGuide').innerText = p.cash ? `익는 중: ${convertToKoreanCurrency(p.cash)}` : '';
      
      document.getElementById('memo').value = p.memo || '';
      document.getElementById('stockList').innerHTML = '';
      document.getElementById('waitList').innerHTML = '';

      if (p.stocks && p.stocks.length) p.stocks.forEach(addStockItem);
      else addStockItem();

      if (p.waits && p.waits.length) p.waits.forEach(addWaitItem);
      else addWaitItem();

      document.getElementById('editMode').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function collectStocks() {
      return Array.from(document.querySelectorAll('.stock-item'))
        .map(row => ({
          name: row.querySelector('.stock-name').value.trim(),
          price: onlyNumber(row.querySelector('.stock-price').value),
          rate: normalizeRate(
            row.querySelector('.stock-rate-sign').value,
            row.querySelector('.stock-rate').value
          ),
          round: row.querySelector('.stock-round').value
        }))
        .filter(x => x.name); 
    }

    function collectWaits() {
      return Array.from(document.querySelectorAll('.wait-name'))
        .map(x => x.value.trim())
        .filter(Boolean);
    }

    function saveData() {
      const name = document.getElementById('name').value.trim();
      if (!name) { alert('이름을 입력해주세요.'); return; }

      const person = {
        id: currentId, 
        name: name,
        totalMoney: onlyNumber(document.getElementById('money').value),
        cash: onlyNumber(document.getElementById('cash').value),
        memo: document.getElementById('memo').value.trim() || '변동 0',
        stocks: collectStocks(),
        waits: collectWaits()
      };

      document.getElementById('saveBtn').disabled = true;
      document.getElementById('saveBtn').innerText = '저장 중...';
      setStatus('저장 중');

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'save', person: person })
      })
      .then(res => res.json())
      .then(res => {
        document.getElementById('saveBtn').disabled = false;
        document.getElementById('saveBtn').innerText = '저장하기';
        if(res.success) {
          setStatus('저장 완료');
          resetForm();
          loadData();
        } else { alert('저장 실패: ' + res.error); }
      })
      .catch(error => {
        document.getElementById('saveBtn').disabled = false;
        document.getElementById('saveBtn').innerText = '저장하기';
        setStatus('저장 실패');
        alert('통신 에러가 발생했습니다.');
      });
    }

    function renderTable() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      const sorted = people.slice().sort((a, b) => a.name.localeCompare(b.name, 'ko'));

      if (!sorted.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">저장된 데이터가 없습니다.</td></tr>';
        return;
      }

      sorted.forEach(function(p) {
        const stockHtml = (p.stocks || []).map(function(s) {
          const cls = String(s.rate || '').startsWith('-') ? 'minus' : 'plus';
          return '<span class="badge ' + cls + '">' +
            s.name + ' ' + money(s.price) + ' ' + (s.rate || '') + ' ' + (s.round || '') +
            '</span>';
        }).join('');

        const waitHtml = (p.waits || []).map(function(w) {
          return '<span class="badge wait">' + w + '</span>';
        }).join('');

        const tr = document.createElement('tr');
        
        const nameTd = document.createElement('td');
        nameTd.className = 'name-cell';
        nameTd.textContent = p.name; 

        tr.appendChild(nameTd);
        
        const restContents = 
          '<td>' + money(p.totalMoney) + '</td>' +
          '<td>' + money(p.cash) + '</td>' +
          '<td>' + (stockHtml || '-') + '</td>' +
          '<td>' + (waitHtml || '-') + '</td>' +
          '<td><div class="action-cell">' +
          '<button type="button" class="btn-sub btn-small src-edit-btn">수정</button>' +
          '<button type="button" class="btn-danger btn-small src-del-btn">삭제</button>' +
          '</div></td>';
          
        tr.insertAdjacentHTML('beforeend', restContents);

        tr.querySelector('.src-edit-btn').onclick = function() { fillForm(p); };
        tr.querySelector('.src-del-btn').onclick = function() { deleteData(p.id); };

        tbody.appendChild(tr);
      });
    }

    function deleteData(id) {
      if (!confirm('삭제하시겠습니까?')) return;
      setStatus('삭제 중');

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'delete', id: id })
      })
      .then(res => res.json())
      .then(res => {
        if(res.success) {
          setStatus('삭제 완료');
          loadData();
        } else { alert('삭제 실패: ' + res.error); }
      });
    }

    function clearAll() {
      if (!confirm('정말 전체 데이터를 삭제하시겠습니까?')) return;
      setStatus('전체 삭제 중');

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'clear' })
      })
      .then(res => res.json())
      .then(res => {
        if(res.success) {
          setStatus('전체 삭제 완료');
          resetForm();
          loadData();
        } else { alert('삭제 실패: ' + res.error); }
      });
    }

    window.onload = function() {
      resetForm();
      loadData();
    };
  </script>
</body>
</html>
